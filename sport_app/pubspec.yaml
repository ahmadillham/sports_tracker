name: sport_app
description: "ESP32 Sports Tracker Companion App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # BLE
  flutter_blue_plus: ^1.35.3

  # State Management
  flutter_riverpod: ^2.6.1

  # Maps (OpenStreetMap - no API key needed)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.2
  permission_handler: ^11.4.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
